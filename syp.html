<!-- MAIN -->
<main class="form-page">

  <h2>Get your showcase website</h2>

<form action="https://formspree.io/f/mojylpjb" method="POST">

  <label>Name</label>
  <input type="text" name="name" required>

  <label>Surname</label>
  <input type="text" name="surname" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Phone</label>
  <input type="tel" name="phone" required>

  <label>What kind of site do you need?</label>
  <select name="service" required>
    <option value="">Select</option>
    <option value="Showcase Website">Showcase Website</option>
  </select>

  <label>Budget</label>
  <select name="budget" required>
    <option value="">Select</option>
    <option value="700+">700+ €</option>
  </select>

  <label>Notes / Request</label>
  <textarea name="message" rows="5"></textarea>

  <button type="submit">Submit</button>

</form>

</main>
